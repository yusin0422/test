	<title>구내염</title>

		body{background: black;}
		h1{font-seizw: 4rem;color:white}
		p{color:white}

<body>
	<h1>구내염</h1>
	<p>기: 밤낮없는 방학을 보내다가 결국 입에 빵꾸가 났다.</p>
	<p>승: 밥을 먹어도 운동을 해도 입속이 아주 욱씬 거린다. 그냥 누워만 있어도 그렇다. 얼마지나면 자연 회복이 된다는데 여튼 너무 아팠다. 난 참을 수 없었다.</p>
	<p>전: 알보칠을 꺼내든 것이다. 그 붉은 액체를 환부에 바르자 곧바로 맹렬한 통증이 입속을 채웠다. 염증이 바늘로 찌르는 기분이라면 이건 송곳으로 찌르는 기분이랄까?</p>
	<p>결: 하얀 염증과 그 고통은 사라졌다. 하지만 알보칠의 기억은 이후로도 은은히 남아있었다.</p>
